<script>
    var dateTime = new Date(); // current date and time
    var hours = dateTime.getHours();

    var weekday = dateTime.getDay(); // output: 0 (Sunday) to 6 (Saturday)
    // array of weekday indexes
    // { 0:"Sunday", 1:"Monday", 2:"Tuesday", 3:"Wednesday", 4:"Thursday", 5:"Friday", 6:"Saturday"}
    var weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    var weekdayName = weekdays[weekday]; // get the weekday name

    var month = dateTime.getMonth(); // output: 0 (January) to 11 (December)
    // array of month indexes
    // { 0:"January", 1:"February", 2:"March", 3:"April", 4:"May", 5:"June", 6:"July", 7:"August", 8:"September", 9:"October", 10:"November", 11:"December"}
    var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    var monthName = months[month]; // get the month name

    document.write("Hours: " + hours);
    document.write("<br>Weekday: " + weekdayName);
    document.write("<br>Month: " + monthName);
// loops
// While loop
document.write("<h4>While Loop</h4>");
var i = 7; // initialization
while (i <= 15) { // Condition
    document.write(i + "<br>"); // code to be executed
    i+=2; // increment by 2
}
// do-while loop
document.write("<h4>Do-While Loop</h4>");
var j = 10; // initialization
do {
    document.write(j + "<br>"); // code to be executed
    j+=3; // increment by 3
} while (j <= 30); // Condition
// for loop
document.write("<h4>For Loop</h4>");
for (var k = 1; k <= 10; k++) { // initialization, condition, increment
    document.write(k + "<br>"); // code to be executed
}
// for of loop (for arrays)
document.write("<h4>For Of Loop</h4>");
var colors = ["Red", "Green", "Blue", "Yellow", "Purple"];
for (var color of colors) { // iterating over the colors array
    if (color === "Yellow") {
        break; // exit the loop when color is Yellow
        // continue; // skip the rest of the loop when color is Yellow
    }
    document.write(color + "<br>"); // code to be executed
}
// for in loop (for objects)
document.write("<h4>For In Loop</h4>");
var car = {
    make: "Toyota",
    model: "Corolla",
    year: 2020,
    color: "Red"
};
for (var carDetail in car) { // iterating over the car object
    document.write(carDetail + ": " + car[carDetail] + "<br>"); // code to be executed
}


</script>
